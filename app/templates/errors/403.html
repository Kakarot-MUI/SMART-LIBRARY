{% extends "base.html" %}
{% block title %}403 Forbidden{% endblock %}
{% block body %}
<div class="error-page">
    <div class="error-code">403</div>
    <h2 class="error-message">Access Denied</h2>
    <p class="error-description">You don't have permission to access this page. Please contact the administrator if you
        believe this is an error.</p>
    <a href="{{ url_for('auth.index') }}" class="btn btn-primary"><i class="bi bi-house me-2"></i>Go Home</a>
</div>
{% endblock %}
