{% extends "base.html" %}
{% block title %}500 Server Error{% endblock %}
{% block body %}
<div class="error-page">
    <div class="error-code">500</div>
    <h2 class="error-message">Something Went Wrong</h2>
    <p class="error-description">We're experiencing a technical issue. Please try again later.</p>
    <a href="{{ url_for('auth.index') }}" class="btn btn-primary"><i class="bi bi-house me-2"></i>Go Home</a>
</div>
{% endblock %}
