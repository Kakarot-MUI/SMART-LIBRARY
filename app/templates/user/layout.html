{% extends "base.html" %}

{% block body %}
{# ── Top Navbar ──────────────────────────────────────────────── #}
<nav class="navbar navbar-expand-lg navbar-olms">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('user.dashboard') }}">
            <i class="bi bi-book-half"></i>Smart Library
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#userNav"
            style="border-color:rgba(255,255,255,.2);">
            <i class="bi bi-list" style="color:#fff; font-size:1.25rem;"></i>
        </button>
        <div class="collapse navbar-collapse" id="userNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('user.dashboard') }}"><i
                            class="bi bi-speedometer2 me-1"></i>Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('user.search') }}"><i class="bi bi-search me-1"></i>Browse
                        Books</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('user.my_books') }}"><i class="bi bi-journal-check me-1"></i>My
                        Books</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('user.chat') }}"><i class="bi bi-chat-dots me-1"></i>Chat</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('auth.logout') }}"><i
                            class="bi bi-box-arrow-left me-1"></i>Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="content-wrapper">
    {% block content %}{% endblock %}
</div>
{% endblock %}
